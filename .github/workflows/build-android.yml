name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          unityVersion: 2022.3.8f1
          buildMethod: BuildScript.BuildAndroid
          androidExportType: androidPackage
          buildName: SilentWard

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilentWard-APK
          path: Build/SilentWard.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }} - Silent Ward"
          body: |
            ## Silent Ward - ホラーゲーム Android ビルド

            廃病棟を舞台にしたホラー脱出ゲームです。

            ### インストール方法
            1. APKファイルをダウンロード
            2. Android端末の「設定 > セキュリティ > 提供元不明のアプリ」を有効にする
            3. ダウンロードしたAPKをタップしてインストール

            ### 遊び方
            - 左側バーチャルジョイスティックで移動
            - 右側タップで近くのアイテムを調べる
            - 鍵カード3枚を集めて出口から脱出せよ！

            Automated build from commit ${{ github.sha }}
          files: Build/SilentWard.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
